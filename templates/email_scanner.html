<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Email Scanner — Phishing Detector</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Courier New',monospace;background:#0a0e1a;color:#c8d8f0;min-height:100vh;padding:2rem 1rem}
  .page{max-width:900px;margin:0 auto}
  h1{color:#00d4ff;font-size:1.6rem;margin-bottom:0.25rem}
  .subtitle{color:#4a7a9b;font-size:0.85rem;margin-bottom:1.5rem}
  .nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem}
  a{color:#00d4ff;text-decoration:none;font-size:0.85rem}
  a:hover{text-decoration:underline}

  .card{background:#111827;border:1px solid #1e3a5f;border-radius:12px;padding:1.5rem;margin-bottom:1rem}
  .section-title{font-size:0.75rem;letter-spacing:0.1em;color:#4a7a9b;text-transform:uppercase;margin-bottom:0.75rem}

  textarea{
    width:100%;background:#060c18;border:1px solid #1e3a5f;
    color:#fff;font-family:'Courier New',monospace;font-size:12px;
    padding:10px 14px;border-radius:8px;outline:none;
    resize:vertical;min-height:200px;line-height:1.6
  }
  textarea:focus{border-color:#00d4ff}

  .btn-row{display:flex;gap:8px;margin-top:0.75rem;flex-wrap:wrap}
  .btn{border:none;border-radius:8px;padding:10px 20px;font-family:'Courier New',monospace;font-weight:bold;cursor:pointer;font-size:13px}
  .btn-primary{background:#00d4ff;color:#000}
  .btn-ghost{background:#111827;color:#00d4ff;border:1px solid #1e3a5f}
  .btn-success{background:#00cc66;color:#000}
  .btn:hover{opacity:0.85}
  .btn:disabled{opacity:0.4;cursor:not-allowed}

  .stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:0.75rem;margin-bottom:1rem}
  .stat{background:#111827;border:1px solid #1e3a5f;border-radius:10px;padding:1rem;text-align:center}
  .stat-num{font-size:1.5rem;font-weight:bold}
  .stat-lbl{font-size:0.7rem;color:#4a7a9b;margin-top:2px}

  .url-result{
    display:flex;align-items:flex-start;gap:12px;
    padding:10px 0;border-bottom:1px solid #0d1a2e
  }
  .url-result:last-child{border-bottom:none}
  .tag{font-size:0.7rem;padding:3px 8px;border-radius:4px;font-weight:bold;white-space:nowrap;flex-shrink:0}
  .tag.phishing{background:#2a0000;color:#ff4444;border:1px solid #ff4444}
  .tag.legit{background:#001a0d;color:#00cc66;border:1px solid #00cc66}
  .tag.scanning{background:#0d1f35;color:#4a7a9b;border:1px solid #1e3a5f}

  .url-text{font-size:0.8rem;color:#8aabcc;word-break:break-all;flex:1}
  .url-conf{font-size:0.75rem;color:#4a7a9b;white-space:nowrap}

  .flag-mini{font-size:0.72rem;color:#ff6666;margin-top:2px}

  .progress-wrap{background:#060c18;border-radius:4px;height:6px;overflow:hidden;margin-top:8px;display:none}
  .progress-fill{height:100%;background:#00d4ff;border-radius:4px;transition:width 0.3s ease;width:0%}

  .loading{display:none;text-align:center;color:#4a7a9b;padding:1rem}
  .spinner{display:inline-block;animation:spin 1s linear infinite}
  @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

  .safe-banner{background:#001a0d;border:1px solid #00cc66;border-radius:8px;padding:1rem;text-align:center;color:#00cc66;font-size:0.9rem}
  .danger-banner{background:#2a0000;border:1px solid #ff4444;border-radius:8px;padding:1rem;text-align:center;color:#ff4444;font-size:0.9rem}

  .sample-emails{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:0.5rem}
  .sample-btn{background:#0d1f35;border:1px solid #1e3a5f;color:#00d4ff;border-radius:6px;padding:4px 10px;font-size:0.75rem;cursor:pointer;font-family:'Courier New',monospace}
  .sample-btn:hover{background:#1e3a5f}

  .extracted-urls{background:#060c18;border:1px solid #1e3a5f;border-radius:8px;padding:0.75rem;margin-top:0.75rem;display:none}
  .extracted-title{font-size:0.7rem;color:#4a7a9b;margin-bottom:6px;letter-spacing:0.05em}
  .extracted-url{font-size:0.75rem;color:#00d4ff;padding:2px 0;word-break:break-all}
</style>
</head>
<body>
<div class="page">

  <div class="nav">
    <div>
      <h1>&#9993; Email Scanner</h1>
      <p class="subtitle">Extract and scan all URLs from an email body</p>
    </div>
    <a href="/">&#8592; Back to Dashboard</a>
  </div>

  <div class="card">
    <div class="section-title">Sample Emails</div>
    <div class="sample-emails">
      <button class="sample-btn" onclick="loadSample('bank')">Fake Bank Alert</button>
      <button class="sample-btn" onclick="loadSample('prize')">Prize Winner Scam</button>
      <button class="sample-btn" onclick="loadSample('tax')">Tax Refund Phish</button>
      <button class="sample-btn" onclick="loadSample('legit')">Legit Email</button>
    </div>
    <div class="section-title" style="margin-top:0.75rem">Paste Email Body</div>
    <textarea id="email-input" placeholder="Paste the full email body here including any links..."></textarea>

    <div class="extracted-urls" id="extracted-box">
      <div class="extracted-title">URLS FOUND IN EMAIL</div>
      <div id="extracted-list"></div>
    </div>

    <div class="progress-wrap" id="progress-wrap">
      <div class="progress-fill" id="progress-fill"></div>
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" id="scan-btn">&#9654; SCAN EMAIL</button>
      <button class="btn btn-ghost" onclick="clearAll()">Clear</button>
      <button class="btn btn-success" id="export-btn" style="display:none" onclick="exportReport()">&#8595; Export Report</button>
    </div>
  </div>

  <div class="loading" id="loading">
    <span class="spinner">&#10227;</span>
    <span id="loading-text"> Scanning URLs...</span>
  </div>

  <div id="stats-section" style="display:none">
    <div class="stats-bar">
      <div class="stat"><div class="stat-num" id="s-total" style="color:#00d4ff">0</div><div class="stat-lbl">URLs Found</div></div>
      <div class="stat"><div class="stat-num" id="s-phish" style="color:#ff4444">0</div><div class="stat-lbl">Phishing</div></div>
      <div class="stat"><div class="stat-num" id="s-legit" style="color:#00cc66">0</div><div class="stat-lbl">Legitimate</div></div>
      <div class="stat"><div class="stat-num" id="s-risk"  style="color:#ffbb00">-</div><div class="stat-lbl">Risk Level</div></div>
    </div>
    <div id="verdict-banner"></div>
  </div>

  <div class="card" id="results-card" style="display:none">
    <div class="section-title">URL Analysis Results</div>
    <div id="results-list"></div>
  </div>

</div>

<script>
const SAMPLES = {
  bank: `Dear Customer,

We have detected unusual activity on your HDFC Bank account.
Your account has been temporarily suspended for security reasons.

Please verify your account immediately to restore access:
http://hdfc-bank-alert-update.xyz/confirm-account?ref=SEC2024

You can also update your details here:
http://secure-hdfc-netbanking-verify.tk/login

Failure to verify within 24 hours will result in permanent account suspension.

Regards,
HDFC Bank Security Team`,

  prize: `CONGRATULATIONS! You have been selected as our lucky winner!

You have won Rs. 50,00,000 in our annual lottery draw.

Claim your prize now at:
http://lucky-winner-prize-india.xyz/claim?id=WIN2024

Or visit our official portal:
http://amazon-gift-card-free.ml/redeem

Please provide your bank details to process the transfer.
Offer expires in 24 hours!`,

  tax: `Dear Taxpayer,

The Income Tax Department of India has processed your refund of Rs. 12,450.

Click below to claim your refund:
http://income-tax-refund-verify.ga/login?pan=ABCDE1234F

Update your bank details here:
http://incometax-refund-portal.tk/update-account

This is an automated message. Do not reply.
Income Tax Department, Government of India`,

  legit: `Hi,

Please find the links to our upcoming webinar resources:

Registration: https://zoom.us/webinar/register/abc123
Materials: https://github.com/example/repo
Schedule: https://google.com/calendar/event?id=xyz

Feel free to reach out if you have any questions.

Best regards,
The Team`
};

function loadSample(type) {
  document.getElementById("email-input").value = SAMPLES[type];
}

function clearAll() {
  document.getElementById("email-input").value = "";
  document.getElementById("extracted-box").style.display   = "none";
  document.getElementById("stats-section").style.display   = "none";
  document.getElementById("results-card").style.display    = "none";
  document.getElementById("export-btn").style.display      = "none";
  document.getElementById("progress-wrap").style.display   = "none";
}

let scanResults = [];

document.getElementById("scan-btn").addEventListener("click", scanEmail);

async function scanEmail() {
  const body = document.getElementById("email-input").value.trim();
  if (!body) { alert("Please paste an email body first."); return; }

  const btn = document.getElementById("scan-btn");
  btn.disabled = true;

  // Extract URLs client-side first to show user
  const urlRegex = /https?:\/\/[^\s"'<>)\]]+/gi;
  const urls     = [...new Set(body.match(urlRegex) || [])];

  if (urls.length === 0) {
    alert("No URLs found in this email.");
    btn.disabled = false;
    return;
  }

  // Show extracted URLs
  const extBox  = document.getElementById("extracted-box");
  const extList = document.getElementById("extracted-list");
  extBox.style.display = "block";
  extList.innerHTML    = urls.map(u =>
    '<div class="extracted-url">' + u + '</div>'
  ).join("");

  // Show progress
  document.getElementById("loading").style.display    = "block";
  document.getElementById("loading-text").textContent = " Scanning " + urls.length + " URLs...";
  document.getElementById("stats-section").style.display  = "none";
  document.getElementById("results-card").style.display   = "none";
  const prog = document.getElementById("progress-wrap");
  const fill = document.getElementById("progress-fill");
  prog.style.display = "block";
  let w = 0;
  const t = setInterval(function() {
    w = Math.min(w + 3, 90);
    fill.style.width = w + "%";
  }, 100);

  try {
    const res  = await fetch("/bulk-scan", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({urls: urls})
    });
    const data = await res.json();
    if (data.error) { alert("Error: " + data.error); return; }

    clearInterval(t);
    fill.style.width = "100%";
    setTimeout(function() { prog.style.display = "none"; }, 400);

    scanResults = data.results;
    displayEmailResults(data);

  } catch(e) {
    alert("Connection error: " + e.message);
  } finally {
    clearInterval(t);
    btn.disabled = false;
    document.getElementById("loading").style.display = "none";
  }
}

function displayEmailResults(data) {
  // Stats
  document.getElementById("stats-section").style.display = "block";
  document.getElementById("s-total").textContent = data.total;
  document.getElementById("s-phish").textContent = data.phishing_count;
  document.getElementById("s-legit").textContent = data.legit_count;

  const risk = data.phishing_count === 0 ? "LOW"
             : data.phishing_count === 1 ? "MED" : "HIGH";
  const riskColor = risk === "LOW" ? "#00cc66" : risk === "MED" ? "#ffbb00" : "#ff4444";
  document.getElementById("s-risk").textContent  = risk;
  document.getElementById("s-risk").style.color  = riskColor;

  // Banner
  const banner = document.getElementById("verdict-banner");
  if (data.phishing_count === 0) {
    banner.innerHTML = '<div class="safe-banner">All URLs appear legitimate — email looks safe</div>';
  } else {
    banner.innerHTML = '<div class="danger-banner">WARNING: ' + data.phishing_count + ' phishing URL(s) detected — do not click any links in this email</div>';
  }

  // Results list
  const list = document.getElementById("results-list");
  list.innerHTML = "";
  data.results.forEach(function(r) {
    const isPhish = r.prediction === 1;
    const short   = r.url.length > 60 ? r.url.slice(0, 60) + "..." : r.url;
    const flagText = r.high_flags > 0 ? r.high_flags + " HIGH severity signals detected" : "";
    list.innerHTML +=
      '<div class="url-result">' +
        '<span class="tag ' + (isPhish ? "phishing" : "legit") + '">' + (isPhish ? "PHISHING" : "SAFE") + '</span>' +
        '<div style="flex:1">' +
          '<div class="url-text" title="' + r.url + '">' + short + '</div>' +
          (flagText ? '<div class="flag-mini">' + flagText + '</div>' : '') +
        '</div>' +
        '<span class="url-conf">' + r.confidence + '%</span>' +
      '</div>';
  });

  document.getElementById("results-card").style.display = "block";
  document.getElementById("export-btn").style.display   = "inline-block";
}

function exportReport() {
  if (!scanResults.length) return;
  const lines = ["EMAIL PHISHING SCAN REPORT", "Generated: " + new Date().toLocaleString(), ""];
  const phishCount = scanResults.filter(r => r.prediction === 1).length;
  lines.push("SUMMARY");
  lines.push("Total URLs: " + scanResults.length);
  lines.push("Phishing:   " + phishCount);
  lines.push("Legitimate: " + (scanResults.length - phishCount));
  lines.push("");
  lines.push("URL DETAILS");
  scanResults.forEach(function(r) {
    lines.push("[" + r.verdict + "] " + r.url + " (" + r.confidence + "% confidence)");
  });
  const blob = new Blob([lines.join("\n")], {type: "text/plain"});
  const a    = document.createElement("a");
  a.style.display = "none";
  a.href     = URL.createObjectURL(blob);
  a.download = "email_scan_report.txt";
  document.body.appendChild(a);
  a.click();
  setTimeout(function() { document.body.removeChild(a); }, 100);
}
</script>
</body>
</html>
